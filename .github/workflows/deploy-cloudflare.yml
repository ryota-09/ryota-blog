name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - staging
  repository_dispatch:
    types: [posts_update]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Set deploy environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            echo "env=prd" >> $GITHUB_OUTPUT
          else
            echo "env=stg" >> $GITHUB_OUTPUT
          fi

      - name: Build and Deploy to Cloudflare Workers (${{ steps.set-env.outputs.env }})
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Cloudflare API への一過性エラー（R2 populate-cache での "Premature close" 等）に対して、
        # 最大3回・30秒間隔で自動リトライする。1回で成功すれば追加コストはゼロ。
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "::group::Deploy attempt $attempt of 3"
            npm run deploy:${{ steps.set-env.outputs.env }}
            exit_code=$?
            echo "::endgroup::"
            if [ $exit_code -eq 0 ]; then
              echo "✅ Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ $attempt -lt 3 ]; then
              echo "⚠️ Deploy failed (exit $exit_code), retrying in 30s..."
              sleep 30
            fi
          done
          echo "❌ Deploy failed after 3 attempts"
          exit 1
